name: Qa

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - "master"
      - "!changeset-release/**"

  pull_request:

jobs:
  immutable-install:
    if: ${{ !startsWith(github.ref, 'refs/heads/changeset-release/') }}
    name: Immutable Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/ci

      # The shared install action does not respect the
      # `--immutable` flag, so we need to run it here.
      - name: Install with lockfile
        run: yarn install --immutable

  linting:
    if: ${{ !startsWith(github.ref, 'refs/heads/changeset-release/') }}
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/ci

      - name: Lint
        run: yarn format

  type-checking:
    if: ${{ !startsWith(github.ref, 'refs/heads/changeset-release/') }}
    name: Type checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/ci

      - name: TypeScript
        run: yarn typecheck

  testing:
    if: ${{ !startsWith(github.ref, 'refs/heads/changeset-release/') }}
    name: Testing
    needs: [immutable-install, linting, type-checking]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/ci

      - name: Build
        run: yarn build

      - uses: oNaiPs/secrets-to-env-action@75f319b3c8c926ac2eabcca34daa6cf531daf32f # v1.8
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: Test (Examples)
        run: |
          cd examples
          # Example lockfiles are gitignored (kept out of Dependabot's scan),
          # so install without --immutable here.
          yarn install
          yarn test

      - name: Test (Unit)
        run: yarn test:unit

      - name: Test (Integration)
        run: yarn test --coverage

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v7 #2db07e317924c76f654a414629d71c65876882e2 v5.4.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: test-coverage

  regression-testing:
    if: ${{ github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/heads/changeset-release/')}}
    name: Regression Testing
    needs: [testing]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - 22
          # - 24
      fail-fast: true
      max-parallel: 1

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/ci

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.version }}

      - name: Build
        run: yarn build

      - uses: oNaiPs/secrets-to-env-action@75f319b3c8c926ac2eabcca34daa6cf531daf32f # v1.8
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: Integration tests
        run: yarn test

  cleanup:
    name: cleanup resource
    runs-on: ubuntu-latest

    # wait for test job
    needs: [testing, regression-testing]

    # ALWAYS run, even if test failed
    if: always()

    steps:
      - uses: actions/checkout@v7
      - uses: oNaiPs/secrets-to-env-action@75f319b3c8c926ac2eabcca34daa6cf531daf32f # v1.8
        with:
          secrets: ${{ toJSON(secrets) }}
      - uses: ./.github/actions/cu
